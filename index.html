<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DigitalHome (DIGI) - Ecosistemas inteligentes, audio premium y diseño minimalista.">
    <title>DigitalHome (DIGI) | Tecnología Minimalista Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --primary: #000000;
            --accent: #111111;
            --light: #ffffff;
            --gray: #f8f8f8;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--light);
            color: var(--primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #eeeeee;
            z-index: 1100;
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            height: 85px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
        }
        .logo-img {
            width: 68px;
            height: 68px;
            object-fit: contain;
            filter: brightness(0);
        }
        .brand-name {
            font-size: 1.85rem;
            font-weight: 900;
            letter-spacing: -1px;
        }
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 42px;
        }
        .nav-menu a {
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--primary);
            position: relative;
        }
        .nav-menu a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: var(--primary);
            transition: width 0.3s ease;
        }
        .nav-menu a:hover::after,
        .nav-menu a.active::after {
            width: 100%;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .hamburger {
            display: none;
            font-size: 1.8rem;
            cursor: pointer;
            background: none;
            border: none;
        }

        /* Mobile Menu */
        .mobile-menu {
            position: fixed;
            top: 85px;
            left: -100%;
            width: 100%;
            height: calc(100vh - 85px);
            background: white;
            transition: left 0.4s ease;
            z-index: 1200;
            padding: 30px 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .mobile-menu.open {
            left: 0;
        }

        /* HERO */
        .hero {
            height: 100vh;
            min-height: 700px;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)),
                        url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=2000&auto=format&fit=crop&q=85') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }
        .hero-content {
            max-width: 820px;
            padding: 0 20px;
        }
        .hero h1 {
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 900;
            letter-spacing: -3px;
            margin-bottom: 20px;
        }
        .hero p {
            font-size: 1.35rem;
            max-width: 620px;
            margin: 0 auto 40px;
            opacity: 0.9;
        }
        .cta-button {
            padding: 18px 48px;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: white;
            color: black;
            border: none;
            cursor: pointer;
            transition: all 0.4s;
        }

        /* FILTROS */
        .category-filters {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 60px 0 30px;
            flex-wrap: wrap;
            padding: 0 20px;
        }
        .filter-btn {
            padding: 12px 32px;
            background: white;
            border: 2px solid #111;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .filter-btn.active,
        .filter-btn:hover {
            background: #111;
            color: white;
        }

        .price-filter {
            text-align: center;
            margin-bottom: 40px;
        }
        .price-range {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .price-input {
            padding: 10px 15px;
            width: 160px;
            border: 1px solid #ddd;
            text-align: center;
        }

        /* Skeleton */
        .skeleton-card {
            background: white;
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .skeleton-img {
            height: 340px;
            background: #f0f0f0;
        }
        .skeleton-info {
            padding: 28px;
        }
        .skeleton-text {
            height: 20px;
            background: #f0f0f0;
            margin-bottom: 12px;
            border-radius: 4px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
            gap: 40px 30px;
            margin-bottom: 120px;
        }
        .product-card {
            background: white;
            border: 1px solid #eee;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .product-card:hover {
            border-color: #111;
            transform: translateY(-12px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.08);
        }
        .product-image-wrapper {
            height: 340px;
            overflow: hidden;
        }
        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s;
        }
        .product-card:hover .product-img {
            transform: scale(1.08);
        }
        .product-info {
            padding: 28px;
        }
        .product-category {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 8px;
        }
        .product-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .product-price {
            font-size: 1.55rem;
            font-weight: 800;
            margin-bottom: 20px;
        }
        .btn-add {
            width: 100%;
            padding: 16px;
            background: #111;
            color: white;
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            cursor: pointer;
        }
        .btn-add:hover {
            background: white;
            color: #111;
            border: 1px solid #111;
        }

        /* CART */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -480px;
            width: 100%;
            max-width: 460px;
            height: 100vh;
            background: white;
            box-shadow: -15px 0 40px rgba(0,0,0,0.15);
            z-index: 2000;
            transition: right 0.45s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex;
            flex-direction: column;
        }
        .cart-sidebar.open {
            right: 0;
        }
        .cart-header {
            padding: 28px 28px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cart-items-container {
            flex: 1;
            padding: 20px 28px;
            overflow-y: auto;
        }
        .cart-item {
            display: flex;
            gap: 18px;
            padding-bottom: 24px;
            margin-bottom: 24px;
            border-bottom: 1px solid #eee;
        }
        .cart-item-img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border: 1px solid #eee;
        }
        .cart-qty-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }
        .qty-btn {
            width: 28px;
            height: 28px;
            border: 1px solid #ddd;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        footer {
            background: #111;
            color: #ddd;
            padding: 100px 24px 60px;
            text-align: center;
        }
        .footer-logo {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1px;
            color: white;
            margin-bottom: 30px;
        }

        @media (max-width: 992px) {
            .nav-menu { display: none; }
            .hamburger { display: block; }
        }
    </style>
</head>
<body>
    <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>

    <!-- HEADER -->
    <header>
        <div class="nav-container">
            <div class="logo-container" onclick="window.scrollTo({top:0, behavior:'smooth'})">
                <img src="1.png" alt="DIGI Logo" class="logo-img">
                <span class="brand-name">DIGI</span>
            </div>

            <nav>
                <ul class="nav-menu">
                    <li><a href="#" class="active">Catálogo</a></li>
                    <li><a href="#">Nosotros</a></li>
                </ul>
            </nav>

            <div class="nav-right">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="Buscar productos..." onkeyup="handleSearch(event)">
                </div>
               
                <button class="cart-icon-container" onclick="toggleCart()">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </button>
                <button class="hamburger" onclick="toggleMobileMenu()">☰</button>
            </div>
        </div>
    </header>

    <!-- MOBILE MENU -->
    <div class="mobile-menu" id="mobileMenu">
        <ul style="list-style: none; font-size: 1.3rem;">
            <li style="padding: 20px 0; border-bottom: 1px solid #eee;"><a href="#" onclick="toggleMobileMenu()">Catálogo</a></li>
            <li style="padding: 20px 0; border-bottom: 1px solid #eee;"><a href="#" onclick="toggleMobileMenu()">Nosotros</a></li>
        </ul>
    </div>

    <!-- HERO -->
    <section class="hero">
        <div class="hero-content">
            <h1>DIGITALHOME</h1>
            <p>Objetos que mejoran tu vida. Diseño atemporal, tecnología sin ruido.</p>
            <button class="cta-button" onclick="document.getElementById('productsSection').scrollIntoView({behavior: 'smooth'})">
                Explorar Colección
            </button>
        </div>
    </section>

    <main class="container">
        <!-- Category Filters -->
        <div class="category-filters">
            <button class="filter-btn active" onclick="filterCategory('all', this)">Todo</button>
            <button class="filter-btn" onclick="filterCategory('tecnologia', this)">Tecnología</button>
            <button class="filter-btn" onclick="filterCategory('audio', this)">Audio</button>
            <button class="filter-btn" onclick="filterCategory('hogar', this)">Hogar</button>
        </div>

        <!-- Price Filter -->
        <div class="price-filter">
            <h3 style="margin-bottom: 15px;">Filtrar por precio</h3>
            <div class="price-range">
                <input type="number" id="minPrice" class="price-input" placeholder="Mínimo" value="0">
                <span style="font-size:1.4rem;">—</span>
                <input type="number" id="maxPrice" class="price-input" placeholder="Máximo" value="2000000">
                <button onclick="applyFilters()" style="padding:10px 28px; background:#111; color:white; border:none; cursor:pointer;">Aplicar</button>
                <button onclick="resetFilters()" style="padding:10px 28px; background:#eee; color:#333; border:none; cursor:pointer;">Resetear</button>
            </div>
        </div>

        <section id="productsSection">
            <h2 class="section-title">Colección Actual</h2>
            <div class="products-grid" id="productsGrid"></div>
        </section>
    </main>

    <!-- CART SIDEBAR -->
    <aside class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>Tu Carrito</h2>
            <button onclick="toggleCart()" style="background:none;border:none;font-size:2rem;cursor:pointer;">×</button>
        </div>
        <div class="cart-items-container" id="cartItems"></div>
        <div style="padding: 28px; border-top: 1px solid #eee; background: #fafafa;">
            <div style="display:flex;justify-content:space-between;font-size:1.4rem;font-weight:800;margin-bottom:24px;">
                <span>Total</span>
                <span id="cartTotal">$ 0</span>
            </div>
            <button onclick="sendOrderToWhatsApp()" style="width:100%;padding:18px;background:#111;color:white;border:none;font-weight:700;letter-spacing:2px;font-size:1.05rem;cursor:pointer;">
                FINALIZAR PEDIDO POR WHATSAPP
            </button>
        </div>
    </aside>

    <footer>
        <div class="footer-logo">DIGITALHOME</div>
        <p style="opacity:0.5;font-size:0.9rem;">© 2026 DigitalHome (DIGI). Todos los derechos reservados.</p>
    </footer>

    <script>
        let products = [
            { id: 1, category: "tecnologia", title: "Tablet E-Ink Black Edition", price: 950000, img: "https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?w=800&auto=format&fit=crop&q=80" },
            { id: 2, category: "audio", title: "Auriculares Studio Wireless", price: 620000, img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800&auto=format&fit=crop&q=80" },
            { id: 3, category: "hogar", title: "Reloj de Pulso Monocromático", price: 380000, img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800&auto=format&fit=crop&q=80" },
            { id: 4, category: "tecnologia", title: "Teclado Mecánico Matte", price: 450000, img: "https://images.unsplash.com/photo-1583394838336-acd977736f90?w=800&auto=format&fit=crop&q=80" },
            { id: 5, category: "audio", title: "Altavoz Cilíndrico Dark", price: 290000, img: "https://images.unsplash.com/photo-1545454675-3531b543be5d?w=800&auto=format&fit=crop&q=80" },
            { id: 6, category: "hogar", title: "Lámpara de Escritorio Inteligente", price: 185000, img: "https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=800&auto=format&fit=crop&q=80" }
        ];

        let cart = [];
        const WHATSAPP_NUMBER = "573018824828";

        function saveCart() {
            localStorage.setItem('digi_cart', JSON.stringify(cart));
        }
        function loadCart() {
            const saved = localStorage.getItem('digi_cart');
            if (saved) cart = JSON.parse(saved);
        }

        function showSkeleton(count = 6) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            let html = '';
            for (let i = 0; i < count; i++) {
                html += `
                    <div class="skeleton-card">
                        <div class="skeleton-img"></div>
                        <div class="skeleton-info">
                            <div class="skeleton-text" style="width:50%;"></div>
                            <div class="skeleton-text" style="width:70%;"></div>
                            <div class="skeleton-text" style="width:40%;"></div>
                        </div>
                    </div>`;
            }
            grid.innerHTML = html;
        }

        function renderProducts(filteredProducts) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            filteredProducts.forEach(product => {
                const card = document.createElement('article');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-image-wrapper">
                        <img src="${product.img}" alt="${product.title}" class="product-img" loading="lazy">
                    </div>
                    <div class="product-info">
                        <span class="product-category">${product.category}</span>
                        <h3 class="product-title">${product.title}</h3>
                        <p class="product-price">$${product.price.toLocaleString('es-CO')}</p>
                        <button class="btn-add" onclick="addToCart(${product.id})">Agregar al Carrito</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.filterCategory = function(category, button) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            button.classList.add('active');
            applyFilters();
        };

        function applyFilters() {
            showSkeleton();
            setTimeout(() => {
                const min = parseInt(document.getElementById('minPrice').value) || 0;
                const max = parseInt(document.getElementById('maxPrice').value) || Infinity;
                const activeBtn = document.querySelector('.filter-btn.active');
                const catFilter = activeBtn.getAttribute('onclick').match(/'([^']+)'/)[1];

                let filtered = products.filter(p => p.price >= min && p.price <= max);
                if (catFilter !== 'all') {
                    filtered = filtered.filter(p => p.category === catFilter);
                }
                renderProducts(filtered);
            }, 550);
        }

        function resetFilters() {
            document.getElementById('minPrice').value = 0;
            document.getElementById('maxPrice').value = 2000000;
            document.querySelectorAll('.filter-btn')[0].classList.add('active');
            applyFilters();
        }

        function toggleMobileMenu() {
            document.getElementById('mobileMenu').classList.toggle('open');
        }

        window.addToCart = function(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            const existing = cart.find(item => item.id === id);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            saveCart();
            updateCartUI();
            toggleCart();
        };

        window.changeQuantity = function(index, change) {
            cart[index].quantity += change;
            if (cart[index].quantity < 1) cart[index].quantity = 1;
            saveCart();
            updateCartUI();
        };

        window.removeFromCart = function(index) {
            cart.splice(index, 1);
            saveCart();
            updateCartUI();
        };

        function updateCartUI() {
            const container = document.getElementById('cartItems');
            const countEl = document.getElementById('cartCount');
            const totalEl = document.getElementById('cartTotal');

            container.innerHTML = '';
            let total = 0;
            let itemCount = 0;

            if (cart.length === 0) {
                container.innerHTML = `<p style="text-align:center;color:#888;padding:60px 20px;">Tu carrito está vacío</p>`;
            } else {
                cart.forEach((item, index) => {
                    const subtotal = item.price * item.quantity;
                    total += subtotal;
                    itemCount += item.quantity;
                    const div = document.createElement('div');
                    div.className = 'cart-item';
                    div.innerHTML = `
                        <img src="${item.img}" class="cart-item-img" alt="${item.title}">
                        <div style="flex:1">
                            <h4 style="font-size:1.05rem;margin-bottom:6px;">${item.title}</h4>
                            <p style="font-weight:700;">$${item.price.toLocaleString('es-CO')}</p>
                            <div class="cart-qty-controls">
                                <button class="qty-btn" onclick="changeQuantity(${index}, -1)">−</button>
                                <span>${item.quantity}</span>
                                <button class="qty-btn" onclick="changeQuantity(${index}, 1)">+</button>
                            </div>
                            <button onclick="removeFromCart(${index})" style="margin-top:12px;color:#c33;font-size:0.85rem;background:none;border:none;cursor:pointer;">Eliminar</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            }
            countEl.textContent = itemCount;
            totalEl.textContent = '$ ' + total.toLocaleString('es-CO');
        }

        window.toggleCart = function() {
            const sidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('cartOverlay');
            sidebar.classList.toggle('open');
            overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
        };

        window.sendOrderToWhatsApp = function() {
            if (cart.length === 0) {
                alert("El carrito está vacío");
                return;
            }
            let message = `*Nuevo Pedido - DIGITALHOME*\n\n`;
            cart.forEach((item, i) => {
                message += `${i+1}. ${item.title}\n Cantidad: ${item.quantity}\n Precio: $${item.price.toLocaleString('es-CO')}\n\n`;
            });
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            message += `Total: *$${total.toLocaleString('es-CO')}*\n\nPor favor confirma disponibilidad.`;

            window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(message)}`, '_blank');

            setTimeout(() => {
                cart = [];
                saveCart();
                updateCartUI();
                toggleCart();
            }, 800);
        };

        window.handleSearch = function(e) {
            if (e.key === 'Enter') {
                const term = document.getElementById('searchInput').value.toLowerCase().trim();
                if (!term) return applyFilters();
                const filtered = products.filter(p => p.title.toLowerCase().includes(term));
                renderProducts(filtered);
            }
        };

        function init() {
            loadCart();
            renderProducts(products);
            updateCartUI();
        }

        window.onload = init;
    </script>
</body>
</html>
