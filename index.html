<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DigitalHome (DIGI) - Ecosistemas inteligentes, audio premium y diseño minimalista.">
    <title>DigitalHome (DIGI) | Tecnología Minimalista Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --primary: #000000;
            --accent: #111111;
            --light: #ffffff;
            --gray: #f8f8f8;
            --text-light: #666666;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--light);
            color: var(--primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #eeeeee;
            z-index: 1100;
            transition: all 0.3s ease;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            height: 85px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .logo-container:hover {
            transform: scale(1.03);
        }

        .logo-img {
            width: 68px;
            height: 68px;
            object-fit: contain;
            filter: brightness(0);
        }

        .brand-name {
            font-size: 1.85rem;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 42px;
        }

        .nav-menu a {
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--primary);
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: var(--primary);
            transition: width 0.3s ease;
        }

        .nav-menu a:hover::after,
        .nav-menu a.active::after {
            width: 100%;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-container {
            position: relative;
            width: 260px;
        }

        .search-input {
            width: 100%;
            padding: 10px 20px 10px 48px;
            border: 1px solid #ddd;
            border-radius: 50px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            width: 300px;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .cart-icon-container {
            position: relative;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.3s;
        }

        .cart-icon-container:hover {
            background: #f5f5f5;
        }

        .cart-count {
            position: absolute;
            top: -2px;
            right: -2px;
            background: var(--primary);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }

        /* HERO */
        .hero {
            height: 100vh;
            min-height: 700px;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), 
                        url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=2000&auto=format&fit=crop&q=85') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            position: relative;
        }

        .hero-content {
            max-width: 820px;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 900;
            letter-spacing: -3px;
            margin-bottom: 20px;
            line-height: 1.05;
        }

        .hero p {
            font-size: 1.35rem;
            max-width: 620px;
            margin: 0 auto 40px;
            opacity: 0.9;
        }

        .cta-button {
            padding: 18px 48px;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: white;
            color: black;
            border: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .cta-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        /* CATEGORIES */
        .category-filters {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 60px 0 40px;
            flex-wrap: wrap;
            padding: 0 20px;
        }

        .filter-btn {
            padding: 12px 32px;
            background: white;
            border: 2px solid #111;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: #111;
            color: white;
        }

        /* PRODUCTS */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .section-title {
            font-size: 2.4rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 50px;
            letter-spacing: -1px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
            gap: 40px 30px;
            margin-bottom: 120px;
        }

        .product-card {
            background: white;
            border: 1px solid #eee;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .product-card:hover {
            border-color: #111;
            transform: translateY(-12px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.08);
        }

        .product-image-wrapper {
            height: 340px;
            overflow: hidden;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .product-card:hover .product-img {
            transform: scale(1.08);
        }

        .product-info {
            padding: 28px;
        }

        .product-category {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 8px;
        }

        .product-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .product-price {
            font-size: 1.55rem;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .btn-add {
            width: 100%;
            padding: 16px;
            background: #111;
            color: white;
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-add:hover {
            background: white;
            color: #111;
            border: 1px solid #111;
        }

        /* CART */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -480px;
            width: 100%;
            max-width: 460px;
            height: 100vh;
            background: white;
            box-shadow: -15px 0 40px rgba(0,0,0,0.15);
            z-index: 2000;
            transition: right 0.45s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            padding: 28px 28px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-items-container {
            flex: 1;
            padding: 20px 28px;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            gap: 18px;
            padding-bottom: 24px;
            margin-bottom: 24px;
            border-bottom: 1px solid #eee;
        }

        .cart-item-img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border: 1px solid #eee;
        }

        .cart-qty-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            border: 1px solid #ddd;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
        }

        /* FOOTER */
        footer {
            background: #111;
            color: #ddd;
            padding: 100px 24px 60px;
            text-align: center;
        }

        .footer-logo {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1px;
            color: white;
            margin-bottom: 30px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 50px;
            max-width: 1200px;
            margin: 0 auto 60px;
        }

        .footer-col a {
            color: #bbb;
            display: block;
            margin-bottom: 12px;
        }

        .footer-col a:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>

    <!-- HEADER -->
    <header>
        <div class="nav-container">
            <div class="logo-container" onclick="window.scrollTo({top:0, behavior:'smooth'})">
                <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=300&auto=format&fit=crop&q=80" alt="DIGI Logo" class="logo-img">
                <span class="brand-name">DIGI</span>
            </div>

            <nav>
                <ul class="nav-menu">
                    <li><a href="#" class="active">Catálogo</a></li>
                    <li><a href="#">Nosotros</a></li>
                </ul>
            </nav>

            <div class="nav-right">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="Buscar productos..." onkeyup="handleSearch(event)">
                </div>
                
                <button class="cart-icon-container" onclick="toggleCart()" aria-label="Ver carrito">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- HERO -->
    <section class="hero">
        <div class="hero-content">
            <h1>DIGITALHOME</h1>
            <p>Objetos que mejoran tu vida. Diseño atemporal, tecnología sin ruido.</p>
            <button class="cta-button" onclick="document.getElementById('productsSection').scrollIntoView({behavior: 'smooth'})">
                Explorar Colección
            </button>
        </div>
    </section>

    <main class="container">
        <div class="category-filters">
            <button class="filter-btn active" data-category="all" onclick="filterProducts('all', this)">Todo</button>
            <button class="filter-btn" data-category="tecnologia" onclick="filterProducts('tecnologia', this)">Tecnología</button>
            <button class="filter-btn" data-category="audio" onclick="filterProducts('audio', this)">Audio</button>
            <button class="filter-btn" data-category="hogar" onclick="filterProducts('hogar', this)">Hogar</button>
        </div>

        <section id="productsSection">
            <h2 class="section-title">Colección Actual</h2>
            <div class="products-grid" id="productsGrid"></div>
        </section>
    </main>

    <!-- CART SIDEBAR -->
    <aside class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>Tu Carrito</h2>
            <button onclick="toggleCart()" style="background:none;border:none;font-size:2rem;cursor:pointer;">×</button>
        </div>
        
        <div class="cart-items-container" id="cartItems"></div>
        
        <div style="padding: 28px; border-top: 1px solid #eee; background: #fafafa;">
            <div style="display:flex;justify-content:space-between;font-size:1.4rem;font-weight:800;margin-bottom:24px;" id="cartTotalRow">
                <span>Total</span>
                <span id="cartTotal">$ 0</span>
            </div>
            <button onclick="sendOrderToWhatsApp()" 
                    style="width:100%;padding:18px;background:#111;color:white;border:none;font-weight:700;letter-spacing:2px;font-size:1.05rem;cursor:pointer;">
                FINALIZAR PEDIDO POR WHATSAPP
            </button>
        </div>
    </aside>

    <footer>
        <div class="footer-logo">DIGITALHOME</div>
        <p style="opacity:0.5;font-size:0.9rem;">© 2026 DigitalHome (DIGI). Todos los derechos reservados.</p>
    </footer>

    <script>
        // ==================== PRODUCTOS ====================
        let products = [
            { id: 1, category: "tecnologia", title: "Tablet E-Ink Black Edition", price: 950000, img: "https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?w=800&auto=format&fit=crop&q=80" },
            { id: 2, category: "audio", title: "Auriculares Studio Wireless", price: 620000, img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800&auto=format&fit=crop&q=80" },
            { id: 3, category: "hogar", title: "Reloj de Pulso Monocromático", price: 380000, img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800&auto=format&fit=crop&q=80" },
            { id: 4, category: "tecnologia", title: "Teclado Mecánico Matte", price: 450000, img: "https://images.unsplash.com/photo-1583394838336-acd977736f90?w=800&auto=format&fit=crop&q=80" },
            { id: 5, category: "audio", title: "Altavoz Cilíndrico Dark", price: 290000, img: "https://images.unsplash.com/photo-1545454675-3531b543be5d?w=800&auto=format&fit=crop&q=80" },
            { id: 6, category: "hogar", title: "Lámpara de Escritorio Inteligente", price: 185000, img: "https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=800&auto=format&fit=crop&q=80" }
        ];

        let cart = [];

        const WHATSAPP_NUMBER = "573018824828";

        // ==================== PERSISTENCIA ====================
        function saveCart() {
            localStorage.setItem('digi_cart', JSON.stringify(cart));
        }

        function loadCart() {
            const savedCart = localStorage.getItem('digi_cart');
            if (savedCart) {
                cart = JSON.parse(savedCart);
            }
        }

        // ==================== RENDER ====================
        function renderProducts(filteredProducts) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';

            filteredProducts.forEach(product => {
                const card = document.createElement('article');
                card.className = 'product-card';
                card.setAttribute('data-category', product.category);
                
                card.innerHTML = `
                    <div class="product-image-wrapper">
                        <img src="${product.img}" alt="${product.title}" class="product-img" loading="lazy">
                    </div>
                    <div class="product-info">
                        <span class="product-category">${product.category}</span>
                        <h3 class="product-title">${product.title}</h3>
                        <p class="product-price">$${product.price.toLocaleString('es-CO')}</p>
                        <button class="btn-add" onclick="addToCart(${product.id})">Agregar al Carrito</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.filterProducts = function(category, button) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');

            let filtered = category === 'all' ? products : products.filter(p => p.category === category);
            renderProducts(filtered);
        };

        // ==================== CARRITO ====================
        window.addToCart = function(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;

            const existing = cart.find(item => item.id === id);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            saveCart();
            updateCartUI();
            toggleCart(); // abre el carrito
        };

        window.changeQuantity = function(index, change) {
            const item = cart[index];
            if (!item) return;
            item.quantity += change;
            if (item.quantity < 1) item.quantity = 1;
            saveCart();
            updateCartUI();
        };

        window.removeFromCart = function(index) {
            cart.splice(index, 1);
            saveCart();
            updateCartUI();
        };

        function updateCartUI() {
            const container = document.getElementById('cartItems');
            const countEl = document.getElementById('cartCount');
            const totalEl = document.getElementById('cartTotal');

            container.innerHTML = '';
            let total = 0;
            let itemCount = 0;

            if (cart.length === 0) {
                container.innerHTML = `<p style="text-align:center;color:#888;padding:60px 20px;">Tu carrito está vacío</p>`;
            } else {
                cart.forEach((item, index) => {
                    const subtotal = item.price * item.quantity;
                    total += subtotal;
                    itemCount += item.quantity;

                    const div = document.createElement('div');
                    div.className = 'cart-item';
                    div.innerHTML = `
                        <img src="${item.img}" class="cart-item-img" alt="${item.title}">
                        <div style="flex:1">
                            <h4 style="font-size:1.05rem;margin-bottom:6px;">${item.title}</h4>
                            <p style="font-weight:700;">$${item.price.toLocaleString('es-CO')}</p>
                            <div class="cart-qty-controls">
                                <button class="qty-btn" onclick="changeQuantity(${index}, -1)">−</button>
                                <span>${item.quantity}</span>
                                <button class="qty-btn" onclick="changeQuantity(${index}, 1)">+</button>
                            </div>
                            <button onclick="removeFromCart(${index})" style="margin-top:12px;color:#c33;font-size:0.85rem;background:none;border:none;cursor:pointer;">Eliminar</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            }

            countEl.textContent = itemCount;
            totalEl.textContent = '$ ' + total.toLocaleString('es-CO');
        }

        window.toggleCart = function() {
            const sidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('cartOverlay');
            sidebar.classList.toggle('open');
            overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
        };

        window.sendOrderToWhatsApp = function() {
            if (cart.length === 0) {
                alert("El carrito está vacío");
                return;
            }

            let message = `*Nuevo Pedido - DIGITALHOME*\n\n`;
            cart.forEach((item, i) => {
                message += `${i+1}. ${item.title}\n`;
                message += `   Cantidad: ${item.quantity}\n`;
                message += `   Precio: $${item.price.toLocaleString('es-CO')}\n\n`;
            });

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            message += `Total: *$${total.toLocaleString('es-CO')}*\n\n`;
            message += `Por favor confirma disponibilidad.`;

            const url = `https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');

            // Opcional: vaciar carrito después de enviar
            // cart = []; saveCart(); updateCartUI(); toggleCart();
        };

        window.handleSearch = function(e) {
            if (e.key === 'Enter') {
                const term = document.getElementById('searchInput').value.toLowerCase().trim();
                if (!term) return renderProducts(products);
                
                const filtered = products.filter(p => 
                    p.title.toLowerCase().includes(term) || p.category.toLowerCase().includes(term)
                );
                renderProducts(filtered);
            }
        };

        // ==================== INIT ====================
        function init() {
            loadCart();
            renderProducts(products);
            updateCartUI();

            // Cerrar carrito con ESC
            document.addEventListener('keydown', (e) => {
                if (e.key === "Escape") {
                    const sidebar = document.getElementById('cartSidebar');
                    if (sidebar.classList.contains('open')) toggleCart();
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
